services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: digitransac-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: DigiTransac
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: digitransac-api
    restart: unless-stopped
    ports:
      - "5172:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017
      MONGODB_DATABASE_NAME: DigiTransac
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-at-least-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-super-secret-encryption-key}
      ENCRYPTION_KEK: ${ENCRYPTION_KEK:-your-super-secret-kek-32chars}
      EMAIL_SENDER: ${EMAIL_SENDER:-}
      EMAIL_APP_PASSWORD: ${EMAIL_APP_PASSWORD:-}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React/Vite frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: digitransac-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    name: digitransac-network
