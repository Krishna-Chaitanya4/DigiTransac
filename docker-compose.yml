version: '3.8'

# This docker-compose is for LOCAL PRODUCTION TESTING ONLY
# For daily development, use: npm run dev (faster, easier debugging)
# Use this to test production builds before pushing to GitHub

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitransac-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - AZURE_KEY_VAULT_URL=${AZURE_KEY_VAULT_URL}
      - MONGODB_DATABASE_NAME=${MONGODB_DATABASE_NAME}
      # For local testing, ensure you're logged in: az login
    networks:
      - digitransac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: digitransac-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - digitransac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  digitransac-network:
    driver: bridge
