# Docker Compose for production deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env file or shell):
#   JWT_SECRET_KEY          - 256-bit key for JWT signing
#   ENCRYPTION_KEK          - Base64 encoded 32-byte Key Encryption Key
#   EMAIL_SENDER            - Sender email address
#   EMAIL_APP_PASSWORD      - SMTP app password
#   VAPID_PUBLIC_KEY        - VAPID public key for web push
#   VAPID_PRIVATE_KEY       - VAPID private key for web push
#   MONGO_ROOT_USERNAME     - MongoDB root username (default: admin)
#   MONGO_ROOT_PASSWORD     - MongoDB root password (required)

services:
  # =============================================================
  # API Backend (.NET 9)
  # =============================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: digitransac-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      MongoDb__ConnectionString: "mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/DigiTransac?authSource=admin&replicaSet=rs0"
      MongoDb__DatabaseName: DigiTransac
      MongoDb__MaxConnectionPoolSize: 200
      MongoDb__MinConnectionPoolSize: 25
      MongoDb__WaitQueueTimeoutSeconds: 30
      MongoDb__RetryWrites: "true"
      MongoDb__RetryReads: "true"
      Redis__ConnectionString: \"redis:6379,password=${REDIS_PASSWORD}\"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: DigiTransac
      Jwt__Audience: DigiTransac
      Jwt__AccessTokenExpireMinutes: 15
      Jwt__RefreshTokenExpireDays: 7
      Encryption__Kek: "${ENCRYPTION_KEK}"
      Encryption__Provider: Local
      Email__SmtpHost: smtp.gmail.com
      Email__SmtpPort: 587
      Email__SenderEmail: "${EMAIL_SENDER}"
      Email__SenderName: DigiTransac
      Email__AppPassword: "${EMAIL_APP_PASSWORD}"
      Security__UseHttps: "true"
      Security__UseSecureCookies: "true"
      WebPush__PublicKey: "${VAPID_PUBLIC_KEY}"
      WebPush__PrivateKey: "${VAPID_PRIVATE_KEY}"
      WebPush__Subject: "mailto:${EMAIL_SENDER}"
      Cors__AllowedOrigins__0: "${CORS_ORIGIN:-https://digitransac.example.com}"
      Serilog__MinimumLevel__Default: Information
      Serilog__MinimumLevel__Override__Microsoft: Warning
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # =============================================================
  # Web Frontend (React + Nginx)
  # =============================================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: digitransac-web
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================
  # MongoDB Replica Set (required for transactions/Unit of Work)
  # =============================================================
  mongodb:
    image: mongo:7
    container_name: digitransac-mongodb
    restart: unless-stopped
    # Port NOT exposed externally — internal Docker network only
    # ports:
    #   - "27017:27017"
    volumes:
      - mongodb_prod_data:/data/db
      - mongodb_prod_config:/data/configdb
      - ./scripts/mongo-init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: DigiTransac
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/dev/null"]
    entrypoint: >
      bash -c '
        # Start MongoDB with replica set (no auth keyFile for single-node)
        exec mongod --replSet rs0 --bind_ip_all
      '
    healthcheck:
      test: >
        mongosh --eval "
          try {
            rs.status().ok
          } catch(e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]});
            sleep(2000);
            rs.status().ok
          }
        " --quiet
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # =============================================================
  # Redis (distributed caching)
  # =============================================================
  redis:
    image: redis:7-alpine
    container_name: digitransac-redis
    restart: unless-stopped
    # Port NOT exposed externally — internal Docker network only
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_prod_data:/data
    command: >
      redis-server
        --save 60 1000
        --loglevel warning
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================
  # MongoDB Backup (daily backup via cron)
  # =============================================================
  mongo-backup:
    image: mongo:7
    container_name: digitransac-mongo-backup
    restart: unless-stopped
    volumes:
      - mongodb_backups:/backups
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: DigiTransac
      MONGO_USER: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_PASS: ${MONGO_ROOT_PASSWORD}
    entrypoint: >
      bash -c '
        echo "Starting backup scheduler..."
        while true; do
          echo "Running backup at $$(date)"
          mongodump --host=$$MONGO_HOST --port=$$MONGO_PORT \
            --username=$$MONGO_USER --password=$$MONGO_PASS --authenticationDatabase=admin \
            --db=$$MONGO_DB --out=/backups/$$(date +%Y%m%d_%H%M%S)
          # Keep only last 7 days of backups
          find /backups -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
          echo "Backup complete. Next backup in 24 hours."
          sleep 86400
        done
      '
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  mongodb_prod_data:
    driver: local
  mongodb_prod_config:
    driver: local
  redis_prod_data:
    driver: local
  mongodb_backups:
    driver: local

networks:
  default:
    name: digitransac-prod-network