<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Viewport configuration for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- SEO and Description -->
    <meta name="description" content="Smart transaction management with beautiful analytics. Track expenses, manage budgets, and gain insights into your finances." />
    <meta name="keywords" content="finance, budget, expense tracker, personal finance, money management, PWA" />
    
    <!-- PWA Theme Colors -->
    <meta name="theme-color" content="#14b8a6" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#14b8a6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d9488" />
    
    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DigiTransac" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    
    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#14b8a6" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>DigiTransac - Personal Finance Tracker</title>
    
    <!-- Roboto Font -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
