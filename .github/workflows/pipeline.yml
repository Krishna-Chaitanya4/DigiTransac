# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                     DigiTransac CI/CD Pipeline                             ║
# ║                                                                            ║
# ║  A unified pipeline with clear stages:                                     ║
# ║  1. Validate  → Run tests, linting, security scans                         ║
# ║  2. Build     → Build Docker images (on main only)                         ║
# ║  3. Push      → Push to Azure Container Registry (on main only)            ║
# ║  4. Deploy    → Deploy to Azure Container Apps (on main only)              ║
# ║  5. Verify    → Health checks and smoke tests                              ║
# ║                                                                            ║
# ║  SECURITY: Uses OIDC federation (no stored secrets!)                       ║
# ╚════════════════════════════════════════════════════════════════════════════╝

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean
      version_tag:
        description: 'Custom version tag'
        required: false
        default: ''
        type: string

# SECURITY: OIDC for Azure authentication
permissions:
  id-token: write
  contents: read
  pull-requests: write  # For PR comments

env:
  # Azure Configuration
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  
  # Azure Resources
  ACR_NAME: ${{ vars.ACR_NAME || 'herdswebsiteacr' }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER || 'herdswebsiteacr.azurecr.io' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-digitransac' }}
  BACKEND_APP: ${{ vars.BACKEND_APP || 'digitransac-backend' }}
  FRONTEND_APP: ${{ vars.FRONTEND_APP || 'digitransac-frontend' }}
  
  # Application URLs (configurable via GitHub Variables)
  BACKEND_URL: ${{ vars.BACKEND_URL || 'https://digitransac-backend.nicemeadow-64e62875.centralindia.azurecontainerapps.io' }}
  FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://digitransac-frontend.nicemeadow-64e62875.centralindia.azurecontainerapps.io' }}
  
  # Custom domains (comma-separated list of allowed CORS origins)
  CUSTOM_DOMAINS: ${{ vars.CUSTOM_DOMAINS || 'https://digitransac.com,https://www.digitransac.com' }}
  
  # Build Configuration
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '22.x'

# ════════════════════════════════════════════════════════════════════════════════
# JOBS
# ════════════════════════════════════════════════════════════════════════════════

jobs:

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ STAGE 0: Setup                                                               │
  # └──────────────────────────────────────────────────────────────────────────────┘
  setup:
    name: 📋 Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
      is_main: ${{ steps.context.outputs.is_main }}
      is_pr: ${{ steps.context.outputs.is_pr }}
    steps:
      - name: Determine Context
        id: context
        run: |
          echo "is_main=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}" >> $GITHUB_OUTPUT
          echo "is_pr=${{ github.event_name == 'pull_request' }}" >> $GITHUB_OUTPUT
          
      - name: Generate Version
        id: version
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "version=${{ inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            DATE=$(date +'%Y%m%d')
            echo "version=${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ STAGE 1: Validate - Backend                                                  │
  # └──────────────────────────────────────────────────────────────────────────────┘
  validate-backend:
    name: 🔧 Validate Backend
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test --no-build --configuration Release \
            --verbosity normal \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"
        env:
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-testing-32chars
          ENCRYPTION_KEY: test-encryption-key-for-ci-testing
          ENCRYPTION_KEK: test-kek-32-characters-exactly!

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: '**/test-results.trx'
          retention-days: 7

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ STAGE 1: Validate - Frontend                                                 │
  # └──────────────────────────────────────────────────────────────────────────────┘
  validate-frontend:
    name: 🌐 Validate Frontend
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Type Check
        working-directory: web
        run: npx tsc --noEmit

      - name: Lint
        working-directory: web
        run: npm run lint
        # Lint errors will fail the build - warnings are allowed

      - name: Test
        working-directory: web
        run: npm test -- --run --reporter=verbose

      - name: Build (Verify)
        working-directory: web
        run: npm run build
        env:
          VITE_API_URL: ${{ env.BACKEND_URL }}/api

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ STAGE 1: Validate - Security                                                 │
  # └──────────────────────────────────────────────────────────────────────────────┘
  validate-security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check .NET Vulnerabilities
        id: dotnet-vuln
        run: |
          echo "### .NET Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Capture vulnerable packages
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1) || true
          
          # Check for actual vulnerabilities (not just warnings)
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "⚠️ **Vulnerable packages found:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Vulnerable .NET packages detected - review recommended"
          else
            echo "✅ No vulnerable packages found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check .NET Outdated Packages
        run: |
          echo "### .NET Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          OUTPUT=$(dotnet list package --outdated 2>&1) || true
          
          if echo "$OUTPUT" | grep -q ">"; then
            echo "📦 **Outdated packages detected:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" | grep -E "^   > |Top-level" >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::notice::Consider updating outdated .NET packages"
          else
            echo "✅ All packages are up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Critically Outdated .NET Packages
        run: |
          echo "### 🚨 Critical .NET Package Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get outdated packages in a parseable format
          OUTPUT=$(dotnet list package --outdated --format json 2>/dev/null) || OUTPUT="{}"
          
          # Check for packages that are 2+ major versions behind
          CRITICAL_OUTDATED=""
          
          # Parse JSON and check major version differences
          # For each project's top-level packages
          PACKAGES=$(echo "$OUTPUT" | jq -r '.projects[]?.frameworks[]?.topLevelPackages[]? | "\(.id)|\(.resolvedVersion)|\(.latestVersion)"' 2>/dev/null || echo "")
          
          while IFS='|' read -r PKG_NAME CURRENT_VER LATEST_VER; do
            if [ -z "$PKG_NAME" ]; then continue; fi
            
            # Extract major versions (handle versions like "1.2.3" or "1.2.3-preview")
            CURRENT_MAJOR=$(echo "$CURRENT_VER" | grep -oE '^[0-9]+' || echo "0")
            LATEST_MAJOR=$(echo "$LATEST_VER" | grep -oE '^[0-9]+' || echo "0")
            
            # Calculate version difference
            DIFF=$((LATEST_MAJOR - CURRENT_MAJOR))
            
            if [ "$DIFF" -ge 2 ]; then
              CRITICAL_OUTDATED="$CRITICAL_OUTDATED\n- $PKG_NAME: $CURRENT_VER → $LATEST_VER (${DIFF} major versions behind)"
            fi
          done <<< "$PACKAGES"
          
          if [ -n "$CRITICAL_OUTDATED" ]; then
            echo "❌ **Critically outdated packages found (2+ major versions behind):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo -e "$CRITICAL_OUTDATED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::error::Critically outdated .NET packages detected - update required"
            echo -e "$CRITICAL_OUTDATED"
            exit 1
          else
            echo "✅ No critically outdated packages (all within 1 major version)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check npm Vulnerabilities
        id: npm-vuln
        working-directory: web
        run: |
          npm ci
          
          echo "### npm Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Run audit and capture output
          set +e
          AUDIT_OUTPUT=$(npm audit --json 2>&1)
          AUDIT_EXIT=$?
          set -e
          
          # Parse JSON for summary
          CRITICAL=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.high // 0')
          MODERATE=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.moderate // 0')
          LOW=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.low // 0')
          
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 Low | $LOW |" >> $GITHUB_STEP_SUMMARY
          
          # Fail only on critical vulnerabilities
          if [ "$CRITICAL" -gt 0 ]; then
            echo ""
            echo "❌ **Critical vulnerabilities found - must be fixed!**" >> $GITHUB_STEP_SUMMARY
            echo "::error::Critical npm vulnerabilities detected - fix required"
            npm audit --audit-level=critical
            exit 1
          elif [ "$HIGH" -gt 0 ]; then
            echo ""
            echo "⚠️ **High vulnerabilities found - review recommended**" >> $GITHUB_STEP_SUMMARY
            echo "::warning::High npm vulnerabilities detected - review recommended"
          else
            echo ""
            echo "✅ No critical or high vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check npm Outdated Packages
        working-directory: web
        run: |
          echo "### npm Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for outdated packages
          set +e
          OUTDATED=$(npm outdated --json 2>&1)
          set -e
          
          # Count outdated packages
          COUNT=$(echo "$OUTDATED" | jq 'length // 0')
          
          if [ "$COUNT" -gt 0 ]; then
            echo "📦 **$COUNT outdated packages:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Current | Wanted | Latest |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
            
            # Parse and display outdated packages
            echo "$OUTDATED" | jq -r 'to_entries[] | "| \(.key) | \(.value.current) | \(.value.wanted) | \(.value.latest) |"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            
            echo "::notice::$COUNT npm packages have updates available"
          else
            echo "✅ All packages are up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Critically Outdated npm Packages
        working-directory: web
        run: |
          echo "### 🚨 Critical npm Package Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for outdated packages
          set +e
          OUTDATED=$(npm outdated --json 2>&1)
          set -e
          
          # Check for packages that are 2+ major versions behind
          CRITICAL_OUTDATED=""
          
          # Parse JSON and check major version differences
          PACKAGES=$(echo "$OUTDATED" | jq -r 'to_entries[] | "\(.key)|\(.value.current)|\(.value.latest)"' 2>/dev/null || echo "")
          
          while IFS='|' read -r PKG_NAME CURRENT_VER LATEST_VER; do
            if [ -z "$PKG_NAME" ]; then continue; fi
            
            # Extract major versions (handle versions like "1.2.3" or "1.2.3-beta.1")
            CURRENT_MAJOR=$(echo "$CURRENT_VER" | grep -oE '^[0-9]+' || echo "0")
            LATEST_MAJOR=$(echo "$LATEST_VER" | grep -oE '^[0-9]+' || echo "0")
            
            # Calculate version difference
            DIFF=$((LATEST_MAJOR - CURRENT_MAJOR))
            
            if [ "$DIFF" -ge 2 ]; then
              CRITICAL_OUTDATED="$CRITICAL_OUTDATED\n- $PKG_NAME: $CURRENT_VER → $LATEST_VER (${DIFF} major versions behind)"
            fi
          done <<< "$PACKAGES"
          
          if [ -n "$CRITICAL_OUTDATED" ]; then
            echo "❌ **Critically outdated packages found (2+ major versions behind):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo -e "$CRITICAL_OUTDATED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::error::Critically outdated npm packages detected - update required"
            echo -e "$CRITICAL_OUTDATED"
            exit 1
          else
            echo "✅ No critically outdated packages (all within 1 major version)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: License Check
        working-directory: web
        run: |
          echo "### License Compliance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Install license-checker if not available
          npx license-checker --summary --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;WTFPL" 2>&1 || {
            echo "⚠️ Some packages have non-standard licenses - manual review may be needed" >> $GITHUB_STEP_SUMMARY
            echo "::notice::License compliance check had warnings - review recommended"
          }
          
          echo "✅ License check completed" >> $GITHUB_STEP_SUMMARY

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ STAGE 2-4: Build → Push → Deploy (Main branch only)                         │
  # └──────────────────────────────────────────────────────────────────────────────┘
  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    needs: [setup, validate-backend, validate-frontend, validate-security]
    if: ${{ needs.setup.outputs.is_main == 'true' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ────────────── Azure Login (OIDC) ──────────────
      - name: Azure Login
        id: azure-login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # ────────────── Build Backend ──────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Backend
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/digitransac-backend:${{ needs.setup.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/digitransac-backend:latest

      # ────────────── Build Frontend ──────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ env.BACKEND_URL }}/api
          VITE_ENVIRONMENT: production

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_URL=${{ env.BACKEND_URL }}/api
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/digitransac-frontend:${{ needs.setup.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/digitransac-frontend:latest

      # ────────────── Deploy ──────────────
      - name: Deploy Backend
        run: |
          echo "🔧 Deploying Backend v${{ needs.setup.outputs.version }}..."
          # Include both Azure Container Apps URL and custom domains for CORS
          CORS_ORIGINS="${{ env.FRONTEND_URL }},${{ env.CUSTOM_DOMAINS }}"
          echo "CORS Origins: $CORS_ORIGINS"
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/digitransac-backend:${{ needs.setup.outputs.version }} \
            --set-env-vars "CORS_ALLOWED_ORIGINS=$CORS_ORIGINS"

      - name: Deploy Frontend
        run: |
          echo "🌐 Deploying Frontend v${{ needs.setup.outputs.version }}..."
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/digitransac-frontend:${{ needs.setup.outputs.version }}

      - name: Azure Logout
        run: az logout
        if: always() && steps.azure-login.outcome == 'success'

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ STAGE 5: Verify Deployment                                                   │
  # └──────────────────────────────────────────────────────────────────────────────┘
  verify:
    name: ✅ Verify
    runs-on: ubuntu-latest
    needs: [setup, build-and-deploy]
    if: ${{ needs.setup.outputs.is_main == 'true' }}
    steps:
      - name: Wait for Deployment
        run: sleep 90

      - name: Health Check - Backend
        run: |
          echo "Checking Backend..."
          for i in {1..5}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ env.BACKEND_URL }}/api/health/live" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $CODE"
            sleep 15
          done
          echo "⚠️ Backend health check inconclusive"

      - name: Health Check - Frontend
        run: |
          echo "Checking Frontend..."
          for i in {1..5}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ env.FRONTEND_URL }}" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✅ Frontend is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $CODE"
            sleep 15
          done
          echo "⚠️ Frontend health check inconclusive"

  # ┌──────────────────────────────────────────────────────────────────────────────┐
  # │ SUMMARY                                                                       │
  # └──────────────────────────────────────────────────────────────────────────────┘
  summary:
    name: 📝 Summary
    runs-on: ubuntu-latest
    needs: [setup, validate-backend, validate-frontend, validate-security, build-and-deploy, verify]
    if: always()
    steps:
      - name: PR Summary
        if: ${{ needs.setup.outputs.is_pr == 'true' }}
        run: |
          echo "## 📋 PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Backend Tests | ${{ needs.validate-backend.result == 'success' && '✅ Passed' || needs.validate-backend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Frontend Tests | ${{ needs.validate-frontend.result == 'success' && '✅ Passed' || needs.validate-frontend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Scan | ${{ needs.validate-security.result == 'success' && '✅ Passed' || needs.validate-security.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-backend.result }}" = "success" ] && \
             [ "${{ needs.validate-frontend.result }}" = "success" ] && \
             [ "${{ needs.validate-security.result }}" = "success" ]; then
            echo "### ✅ Ready for merge!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All validations passed. This PR can be safely merged." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Some checks failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the failed checks above before merging." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              PR Validation Complete                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Backend Tests:  ${{ needs.validate-backend.result }}"
          echo "Frontend Tests: ${{ needs.validate-frontend.result }}"
          echo "Security Scan:  ${{ needs.validate-security.result }}"

      - name: Deploy Summary
        if: ${{ needs.setup.outputs.is_main == 'true' }}
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Version | \`${{ needs.setup.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Commit | \`${{ needs.setup.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Auth | OIDC Federation |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Application URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** ${{ env.BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom Domain:** https://digitransac.com" >> $GITHUB_STEP_SUMMARY
