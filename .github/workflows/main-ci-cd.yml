name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write
  pull-requests: read
  actions: read

env:
  NODE_VERSION: '20'
  REGISTRY: herdswebsiteacr.azurecr.io
  BACKEND_IMAGE: digitransac-backend
  FRONTEND_IMAGE: digitransac-frontend
  RESOURCE_GROUP: rg-digitransac
  BACKEND_CONTAINER_APP: digitransac-backend
  FRONTEND_CONTAINER_APP: digitransac-frontend
  # Dependency strictness: BALANCED (allows 1 version behind) | STRICT (must be latest)
  # TODO: Switch to STRICT after this PR merges and Dependabot updates are processed
  STRICTNESS: BALANCED

jobs:
  # ==================== STAGE 1: VALIDATION ====================
  
  validation:
    name: 📌 Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Fetch main branch (PR only)
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      run: git fetch origin main:main
    
    - name: Get current versions
      id: current
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        FRONTEND_VERSION=$(cat frontend/VERSION)
        echo "backend=$BACKEND_VERSION" >> $GITHUB_OUTPUT
        echo "frontend=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
    
    - name: Get main branch versions (PR only)
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      id: main
      run: |
        BACKEND_VERSION=$(git show main:backend/VERSION)
        FRONTEND_VERSION=$(git show main:frontend/VERSION)
        echo "backend=$BACKEND_VERSION" >> $GITHUB_OUTPUT
        echo "frontend=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
    
    - name: Compare versions (PR only)
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      run: |
        echo "🔍 Version Comparison"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Backend:  ${{ steps.main.outputs.backend }} → ${{ steps.current.outputs.backend }}"
        echo "Frontend: ${{ steps.main.outputs.frontend }} → ${{ steps.current.outputs.frontend }}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        if [ "${{ steps.current.outputs.backend }}" == "${{ steps.main.outputs.backend }}" ]; then
          echo "❌ ERROR: Backend version not updated!"
          exit 1
        fi
        
        if [ "${{ steps.current.outputs.frontend }}" == "${{ steps.main.outputs.frontend }}" ]; then
          echo "❌ ERROR: Frontend version not updated!"
          exit 1
        fi
        
        echo "✅ Both versions have been updated"
    
    - name: Check version consistency
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        FRONTEND_VERSION=$(cat frontend/VERSION)
        BACKEND_PKG_VERSION=$(node -p "require('./backend/package.json').version")
        FRONTEND_PKG_VERSION=$(node -p "require('./frontend/package.json').version")
        
        if [ "$BACKEND_VERSION" != "$BACKEND_PKG_VERSION" ]; then
          echo "❌ Backend VERSION and package.json mismatch!"
          exit 1
        fi
        
        if [ "$FRONTEND_VERSION" != "$FRONTEND_PKG_VERSION" ]; then
          echo "❌ Frontend VERSION and package.json mismatch!"
          exit 1
        fi
        
        echo "✅ Version files are consistent"
    
    - name: Check CHANGELOG updated (PR only)
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        if grep -q "\[$BACKEND_VERSION\]" CHANGELOG.md; then
          echo "✅ CHANGELOG.md updated for v$BACKEND_VERSION"
        else
          echo "❌ ERROR: CHANGELOG.md missing entry for v$BACKEND_VERSION"
          exit 1
        fi
    
    - name: Validate semantic versioning
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        if [[ ! $BACKEND_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ ERROR: Invalid semver format: $BACKEND_VERSION"
          exit 1
        fi
        echo "✅ Valid semantic version: v$BACKEND_VERSION"

  # ==================== STAGE 2: SECURITY ====================
  
  security:
    name: 🔐 Security
    runs-on: ubuntu-latest
    needs: validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check for hardcoded secrets
      run: |
        echo "🔍 Scanning for hardcoded secrets..."
        
        if grep -r -E "(mongodb\+srv://[^:]+:[^@]{20,}@|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,})" \
           --include="*.ts" --include="*.js" \
           --exclude-dir=node_modules --exclude-dir=dist \
           --exclude="*.test.ts" --exclude="*envValidator.ts" .; then
          echo "❌ Found potential hardcoded secrets!"
          exit 1
        fi
        
        echo "✅ No hardcoded secrets found"
    
    - name: Verify Key Vault references
      run: |
        echo "🔍 Verifying Key Vault integration..."
        
        if ! grep -r "keyVaultService" backend/src --include="*.ts" | grep -q "getSecret"; then
          echo "⚠️ Warning: Key Vault usage not detected"
        else
          echo "✅ Key Vault service properly integrated"
        fi
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Dependency audit - Backend (strict)
      run: |
        cd backend
        echo "🔍 Checking for high/critical vulnerabilities..."
        npm audit --audit-level=high
    
    - name: Dependency audit - Frontend (strict)
      run: |
        cd frontend
        echo "🔍 Checking for high/critical vulnerabilities..."
        npm audit --audit-level=high
    
    - name: Check for deprecated packages
      run: |
        echo "📦 Checking for deprecated packages..."
        cd backend
        npx check-is-deprecated || echo "⚠️ Deprecated packages found in backend"
        cd ../frontend
        npx check-is-deprecated || echo "⚠️ Deprecated packages found in frontend"
    
    - name: Check for outdated packages
      run: |
        echo "🔍 Checking for major outdated dependencies..."
        cd backend
        echo "Backend:"
        npm outdated --long || echo "Some packages are outdated"
        cd ../frontend
        echo "Frontend:"
        npm outdated --long || echo "Some packages are outdated"
      continue-on-error: true
    
    - name: Install dependencies for package checks
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci
    
    - name: Check for severely outdated packages
      # STRICTNESS controlled at workflow level (top env section)
      # BALANCED: allows 1 version behind | STRICT: must be latest
      run: |
        node .github/scripts/check-outdated-packages.js backend backend
        node .github/scripts/check-outdated-packages.js frontend frontend
    
    - name: License compliance check
      run: |
        echo "🔍 Checking license compliance..."
        cd backend
        npm install --package-lock-only
        npx license-checker --summary
        cd ../frontend
        npm install --package-lock-only
        npx license-checker --summary
        echo "✅ License check complete"

  # ==================== STAGE 3: BUILD & TEST (PARALLEL) ====================
  
  backend-build-test:
    name: 🔨 Backend Build & Test
    runs-on: ubuntu-latest
    needs: [validation, security]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    
    - name: Check code formatting
      run: |
        cd backend
        npm run format:check
    
    - name: Run linter (strict)
      run: |
        cd backend
        npm run lint
    
    - name: Check TypeScript compilation
      run: |
        cd backend
        npm run build
    
    - name: Run tests with coverage
      run: |
        cd backend
        npm test -- --coverage --coverageReporters=json-summary
    
    - name: Check coverage threshold (baseline)
      run: |
        cd backend
        COVERAGE_LINES=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
        COVERAGE_BRANCHES=$(node -p "require('./coverage/coverage-summary.json').total.branches.pct")
        COVERAGE_FUNCTIONS=$(node -p "require('./coverage/coverage-summary.json').total.functions.pct")
        COVERAGE_STATEMENTS=$(node -p "require('./coverage/coverage-summary.json').total.statements.pct")
        
        echo "📊 Code Coverage:"
        echo "  Lines:      ${COVERAGE_LINES}%"
        echo "  Branches:   ${COVERAGE_BRANCHES}%"
        echo "  Functions:  ${COVERAGE_FUNCTIONS}%"
        echo "  Statements: ${COVERAGE_STATEMENTS}%"
        
        echo ""
        echo "ℹ️  Current thresholds (baseline to prevent regressions):"
        echo "   Lines: 1%, Branches: 1%, Functions: 1%"
        echo "   Target (future): Lines: 70%, Branches: 60%, Functions: 70%"
        
        FAILED=0
        if (( $(echo "$COVERAGE_LINES < 1" | bc -l) )); then
          echo "❌ Line coverage below 1% baseline"
          FAILED=1
        fi
        if (( $(echo "$COVERAGE_BRANCHES < 1" | bc -l) )); then
          echo "❌ Branch coverage below 1% baseline"
          FAILED=1
        fi
        if (( $(echo "$COVERAGE_FUNCTIONS < 1" | bc -l) )); then
          echo "❌ Function coverage below 1% baseline"
          FAILED=1
        fi
        
        if [ $FAILED -eq 1 ]; then
          exit 1
        fi
        
        echo "✅ Coverage meets baseline thresholds"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage
    
    - name: Build Docker image
      run: |
        cd backend
        docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} .
        echo "✅ Backend Docker image built"
    
    - name: Save Docker image
      run: |
        docker save ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -o /tmp/backend-image.tar
    
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-image
        path: /tmp/backend-image.tar
        retention-days: 1

  frontend-build-test:
    name: 🎨 Frontend Build & Test
    runs-on: ubuntu-latest
    needs: [validation, security]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Check code formatting
      run: |
        cd frontend
        npm run format:check
    
    - name: Run linter (strict)
      run: |
        cd frontend
        npm run lint
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build
    
    - name: Check bundle size
      run: |
        cd frontend/dist
        TOTAL_SIZE=$(du -sb . | cut -f1)
        SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
        
        echo "## 📦 Build Size: ${SIZE_MB}MB" >> $GITHUB_STEP_SUMMARY
        du -h --max-depth=1 . >> $GITHUB_STEP_SUMMARY
        
        # Alert if bundle is too large (>10MB)
        if (( $(echo "$SIZE_MB > 10" | bc -l) )); then
          echo "⚠️ Warning: Bundle size exceeds 10MB"
        fi
    
    - name: Build Docker image
      run: |
        cd frontend
        docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} .
        echo "✅ Frontend Docker image built"
    
    - name: Save Docker image
      run: |
        docker save ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -o /tmp/frontend-image.tar
    
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-image
        path: /tmp/frontend-image.tar
        retention-days: 1

  # ==================== STAGE 4: CONTAINER SECURITY ====================
  
  container-security:
    name: 🛡️ Container Security Scan
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download backend image
      uses: actions/download-artifact@v4
      with:
        name: backend-image
        path: /tmp
    
    - name: Download frontend image
      uses: actions/download-artifact@v4
      with:
        name: frontend-image
        path: /tmp
    
    - name: Load Docker images
      run: |
        docker load -i /tmp/backend-image.tar
        docker load -i /tmp/frontend-image.tar
    
    - name: Run Trivy scan - Backend
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
        format: 'sarif'
        output: 'backend-trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Check Backend scan results
      id: backend-scan
      run: |
        if [ -f "backend-trivy-results.sarif" ]; then
          echo "✅ Backend SARIF file created"
          ls -lh backend-trivy-results.sarif
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "⚠️ Backend SARIF file not found - no vulnerabilities or scan failed"
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload Backend Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      if: steps.backend-scan.outputs.exists == 'true'
      with:
        sarif_file: 'backend-trivy-results.sarif'
        category: 'container-security-backend'
    
    - name: Run Trivy scan - Frontend
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
        format: 'sarif'
        output: 'frontend-trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Check Frontend scan results
      id: frontend-scan
      run: |
        if [ -f "frontend-trivy-results.sarif" ]; then
          echo "✅ Frontend SARIF file created"
          ls -lh frontend-trivy-results.sarif
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "⚠️ Frontend SARIF file not found - no vulnerabilities or scan failed"
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload Frontend Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      if: steps.frontend-scan.outputs.exists == 'true'
      with:
        sarif_file: 'frontend-trivy-results.sarif'
        category: 'container-security-frontend'
    
    - name: Security scan summary
      if: always()
      run: |
        echo "## 🛡️ Container Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.backend-scan.outputs.exists }}" == "true" ]; then
          echo "- ✅ Backend: Scanned successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ⚠️ Backend: No vulnerabilities or scan skipped" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ steps.frontend-scan.outputs.exists }}" == "true" ]; then
          echo "- ✅ Frontend: Scanned successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ⚠️ Frontend: No vulnerabilities or scan skipped" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "ℹ️ To view detailed security results, enable GitHub Code Scanning in repository settings." >> $GITHUB_STEP_SUMMARY

  # ==================== STAGE 5: DEPLOY BACKEND ====================
  
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-build-test, container-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get version
      id: version
      run: |
        VERSION=$(cat backend/VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Deploying Backend v$VERSION"
    
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Log in to ACR
      run: az acr login --name herdswebsiteacr
    
    - name: Download backend image
      uses: actions/download-artifact@v4
      with:
        name: backend-image
        path: /tmp
    
    - name: Load and push Docker image
      run: |
        docker load -i /tmp/backend-image.tar
        VERSION=${{ steps.version.outputs.VERSION }}
        IMAGE_TAG="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${VERSION}"
        IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"
        
        docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${IMAGE_TAG}
        docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${IMAGE_TAG_LATEST}
        
        echo "Pushing to ACR..."
        docker push ${IMAGE_TAG}
        docker push ${IMAGE_TAG_LATEST}
        
        echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
    
    - name: Update Container App
      run: |
        echo "Deploying backend v${VERSION}..."
        
        az containerapp update \
          --name ${{ env.BACKEND_CONTAINER_APP }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${IMAGE_TAG} \
          --set-env-vars "VERSION=${VERSION}"
        
        echo "✅ Backend v${VERSION} deployed successfully!"
        echo "## 🚀 Backend Deployed" >> $GITHUB_STEP_SUMMARY
        echo "- Version: v${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "- Image: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY

  # ==================== STAGE 6: DEPLOY FRONTEND ====================
  
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: [frontend-build-test, container-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get version
      id: version
      run: |
        VERSION=$(cat frontend/VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Deploying Frontend v$VERSION"
    
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Log in to ACR
      run: az acr login --name herdswebsiteacr
    
    - name: Download frontend image
      uses: actions/download-artifact@v4
      with:
        name: frontend-image
        path: /tmp
    
    - name: Load and push Docker image
      run: |
        docker load -i /tmp/frontend-image.tar
        VERSION=${{ steps.version.outputs.VERSION }}
        IMAGE_TAG="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${VERSION}"
        IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"
        
        docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${IMAGE_TAG}
        docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${IMAGE_TAG_LATEST}
        
        echo "Pushing to ACR..."
        docker push ${IMAGE_TAG}
        docker push ${IMAGE_TAG_LATEST}
        
        echo "FRONTEND_IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        echo "FRONTEND_VERSION=${VERSION}" >> $GITHUB_ENV
    
    - name: Update Container App
      run: |
        echo "Deploying frontend v${FRONTEND_VERSION}..."
        
        az containerapp update \
          --name ${{ env.FRONTEND_CONTAINER_APP }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${FRONTEND_IMAGE_TAG} \
          --set-env-vars "VERSION=${FRONTEND_VERSION}"
        
        echo "✅ Frontend v${FRONTEND_VERSION} deployed successfully!"
        echo "## 🎨 Frontend Deployed" >> $GITHUB_STEP_SUMMARY
        echo "- Version: v${FRONTEND_VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "- Image: ${FRONTEND_IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
