name: Version Update Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-version-bump:
    name: Verify Version Updated
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Fetch main branch
      run: git fetch origin main:main
    
    - name: Get current versions
      id: current
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        FRONTEND_VERSION=$(cat frontend/VERSION)
        echo "backend=$BACKEND_VERSION" >> $GITHUB_OUTPUT
        echo "frontend=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
    
    - name: Get main branch versions
      id: main
      run: |
        BACKEND_VERSION=$(git show main:backend/VERSION)
        FRONTEND_VERSION=$(git show main:frontend/VERSION)
        echo "backend=$BACKEND_VERSION" >> $GITHUB_OUTPUT
        echo "frontend=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
    
    - name: Compare versions
      run: |
        echo "🔍 Version Comparison"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Backend:"
        echo "  Main:    ${{ steps.main.outputs.backend }}"
        echo "  Current: ${{ steps.current.outputs.backend }}"
        echo ""
        echo "Frontend:"
        echo "  Main:    ${{ steps.main.outputs.frontend }}"
        echo "  Current: ${{ steps.current.outputs.frontend }}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        # Check if versions have been bumped
        if [ "${{ steps.current.outputs.backend }}" == "${{ steps.main.outputs.backend }}" ]; then
          echo "❌ ERROR: Backend version not updated!"
          echo "Please bump the version in backend/VERSION"
          exit 1
        fi
        
        if [ "${{ steps.current.outputs.frontend }}" == "${{ steps.main.outputs.frontend }}" ]; then
          echo "❌ ERROR: Frontend version not updated!"
          echo "Please bump the version in frontend/VERSION"
          exit 1
        fi
        
        echo "✅ Both versions have been updated"
    
    - name: Check version consistency
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        FRONTEND_VERSION=$(cat frontend/VERSION)
        BACKEND_PKG_VERSION=$(node -p "require('./backend/package.json').version")
        FRONTEND_PKG_VERSION=$(node -p "require('./frontend/package.json').version")
        
        echo "🔍 Version Consistency Check"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Backend VERSION:      $BACKEND_VERSION"
        echo "Backend package.json: $BACKEND_PKG_VERSION"
        echo "Frontend VERSION:     $FRONTEND_VERSION"
        echo "Frontend package.json: $FRONTEND_PKG_VERSION"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        MISMATCH=0
        
        if [ "$BACKEND_VERSION" != "$BACKEND_PKG_VERSION" ]; then
          echo "❌ Backend VERSION and package.json mismatch!"
          MISMATCH=1
        fi
        
        if [ "$FRONTEND_VERSION" != "$FRONTEND_PKG_VERSION" ]; then
          echo "❌ Frontend VERSION and package.json mismatch!"
          MISMATCH=1
        fi
        
        if [ "$BACKEND_VERSION" != "$FRONTEND_VERSION" ]; then
          echo "⚠️  Warning: Backend and Frontend versions differ"
          echo "This is allowed but should be intentional"
        fi
        
        if [ $MISMATCH -eq 1 ]; then
          echo ""
          echo "Please ensure all version files are in sync:"
          echo "  - backend/VERSION"
          echo "  - backend/package.json"
          echo "  - frontend/VERSION"
          echo "  - frontend/package.json"
          exit 1
        fi
        
        echo "✅ All version files are consistent"
    
    - name: Check CHANGELOG updated
      run: |
        echo "🔍 Checking CHANGELOG.md"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        BACKEND_VERSION=$(cat backend/VERSION)
        
        if grep -q "\[$BACKEND_VERSION\]" CHANGELOG.md; then
          echo "✅ CHANGELOG.md contains entry for version $BACKEND_VERSION"
        else
          echo "❌ ERROR: CHANGELOG.md missing entry for version $BACKEND_VERSION"
          echo ""
          echo "Please add a changelog entry with format:"
          echo "## [$BACKEND_VERSION] - $(date +%Y-%m-%d)"
          exit 1
        fi
    
    - name: Validate semantic versioning
      run: |
        BACKEND_VERSION=$(cat backend/VERSION)
        
        # Check if version follows semver pattern (X.Y.Z)
        if [[ ! $BACKEND_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ ERROR: Invalid version format: $BACKEND_VERSION"
          echo "Version must follow semantic versioning (X.Y.Z)"
          echo "Examples: 1.0.0, 1.2.3, 2.0.0"
          exit 1
        fi
        
        echo "✅ Version follows semantic versioning: $BACKEND_VERSION"
    
    - name: Success Summary
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "✅ All version checks passed!"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "✓ Version has been bumped"
        echo "✓ All version files are consistent"
        echo "✓ CHANGELOG.md has been updated"
        echo "✓ Semantic versioning is valid"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Ready to merge! 🚀"
