name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: herdswebsiteacr.azurecr.io
  IMAGE_NAME: digitransac-backend
  RESOURCE_GROUP: rg-digitransac
  CONTAINER_APP: digitransac-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version from VERSION file
      id: version
      run: |
        VERSION=$(cat backend/VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Deploying version: $VERSION"
    
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Log in to Azure Container Registry
      run: |
        az acr login --name herdswebsiteacr
    
    - name: Build and push Docker image
      run: |
        cd backend
        VERSION=${{ steps.version.outputs.VERSION }}
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                     -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${VERSION} \
                     -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${VERSION}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    
    - name: Deploy to Azure Container App
      run: |
        az containerapp update \
          --name ${{ env.CONTAINER_APP }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.VERSION }} \
          --set-env-vars \
            "COSMOS_ENDPOINT=${{ secrets.COSMOS_ENDPOINT }}" \
            "COSMOS_KEY=${{ secrets.COSMOS_KEY }}" \
            "COSMOS_DATABASE_NAME=${{ secrets.COSMOS_DATABASE_NAME }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "KEY_VAULT_URL=${{ secrets.KEY_VAULT_URL }}" \
            "MASTER_ENCRYPTION_KEY=${{ secrets.MASTER_ENCRYPTION_KEY }}" \
            "PORT=5000" \
            "NODE_ENV=production" \
            "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" \
            "API_URL=${{ secrets.API_URL }}"
    
    - name: Wait for deployment to complete
      run: sleep 30
    
    - name: Check deployment logs
      run: |
        az containerapp logs show \
          --name ${{ env.CONTAINER_APP }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --tail 50
    
    - name: Create deployment summary
      run: |
        echo "## 🚀 Backend Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** v${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Container App:** ${{ env.CONTAINER_APP }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL:** https://digitransac-backend.nicemeadow-64e62875.centralindia.azurecontainerapps.io" >> $GITHUB_STEP_SUMMARY
