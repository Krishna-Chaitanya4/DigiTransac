<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  
  <!-- Digital circuit lines -->
  <path d="M8 32 L16 32 L20 28 L28 28" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M36 28 L44 28 L48 32 L56 32" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M32 8 L32 16 L28 20 L28 24" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M28 40 L28 44 L32 48 L32 56" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Digital nodes/dots -->
  <circle cx="8" cy="32" r="2" fill="#93c5fd"/>
  <circle cx="56" cy="32" r="2" fill="#93c5fd"/>
  <circle cx="32" cy="8" r="2" fill="#93c5fd"/>
  <circle cx="32" cy="56" r="2" fill="#93c5fd"/>
  
  <!-- Central coin with digital pattern -->
  <circle cx="32" cy="32" r="14" fill="url(#coinGrad)" stroke="#fcd34d" stroke-width="2"/>
  
  <!-- Rupee symbol as text -->
  <text x="32" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1d4ed8">₹</text>
  
  <!-- Small pixel accents -->
  <rect x="12" cy="28" width="2" height="2" fill="#93c5fd" opacity="0.8"/>
  <rect x="50" y="34" width="2" height="2" fill="#93c5fd" opacity="0.8"/>
  <rect x="26" y="12" width="2" height="2" fill="#93c5fd" opacity="0.8"/>
  <rect x="36" y="50" width="2" height="2" fill="#93c5fd" opacity="0.8"/>
</svg>
